      /* Critical CSS for Preloader */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #070709;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.8s cubic-bezier(0.65, 0, 0.35, 1),
          visibility 0.8s;
        overflow: hidden;
      }
      /* Tech Grid Pattern overlay */
      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(88, 127, 129, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88, 127, 129, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center;
        pointer-events: none;
        z-index: 0;
      }
      .grid-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 35%, #070709 85%);
      }
      #preloader.loaded {
        opacity: 0;
        visibility: hidden;
      }
      .tech-loader-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1;
        width: 300px;
      }
      .scan-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(88, 127, 129, 0.15);
        background: rgba(88, 127, 129, 0.02);
        box-shadow: inset 0 0 15px rgba(88, 127, 129, 0.05);
      }
      .scan-grid {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(88, 127, 129, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88, 127, 129, 0.05) 1px, transparent 1px);
        background-size: 12px 12px;
        background-position: center;
      }
      .scan-line {
        position: absolute;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, #587f81, #91b6b1, #587f81, transparent);
        box-shadow: 0 0 8px rgba(88, 127, 129, 0.8), 0 0 15px rgba(88, 127, 129, 0.5);
        top: 0;
        left: 0;
        animation: scan-anim 2.5s ease-in-out infinite;
      }
      #preloader .logo {
        width: 52px;
        height: 52px;
        animation: logo-pulse 2.5s ease-in-out infinite;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        z-index: 2;
      }
      
      .tech-loader {
        width: 100%;
        font-family: monospace;
      }
      .terminal-header {
        font-size: 9px;
        letter-spacing: 0.2em;
        color: rgba(88, 127, 129, 0.8);
        text-transform: uppercase;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .cyber-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 2px;
        position: relative;
        overflow: hidden;
        margin-bottom: 12px;
      }
      #progress-bar-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #587f81, #91b6b1);
        box-shadow: 0 0 6px #587f81;
        transition: width 0.08s ease-out;
      }
      .terminal-status {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.05em;
      }
      #load-percentage {
        color: rgba(255, 255, 255, 0.85);
        font-weight: bold;
      }

      @keyframes scan-anim {
        0%, 100% { top: 0%; }
        50% { top: 98%; }
      }
      @keyframes logo-pulse {
        0%, 100% {
          transform: scale(0.97);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.03);
          opacity: 1;
        }
      }

      /* Scroll Animation */
      .animate-scroll {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.8s ease-out,
          transform 0.8s ease-out;
      }
      .animate-scroll.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

  <body>
    <div id="preloader">
      <div class="grid-overlay"></div>
      <div class="tech-loader-content">
        <div class="scan-container">
          <div class="scan-grid"></div>
          <div class="scan-line"></div>
          <img src="/logos/logobranca.png" class="logo" alt="Logo Domu Tech" />
        </div>
        <div class="tech-loader">
          <div class="terminal-header">
            <span>SYS_INIT // BOOT_SEQ</span>
            <span>v2.4</span>
          </div>
          <div class="cyber-bar">
            <div id="progress-bar-fill"></div>
          </div>
          <div class="terminal-status">
            <span id="status-msg">> BOOTING_SYSTEM...</span>
            <span id="load-percentage">00%</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        var count = 0;
        var counterEl = document.getElementById('load-percentage');
        var loaderEl = document.getElementById('preloader');
        var progressBar = document.getElementById('progress-bar-fill');
        var statusEl = document.getElementById('status-msg');
        
        var statuses = [
          { min: 0, text: '> BOOTING_SYSTEM...' },
          { min: 25, text: '> INITIALIZING_IA_CORES...' },
          { min: 50, text: '> LOADING_INTERFACE...' },
          { min: 75, text: '> COMPILING_ASSETS...' },
          { min: 100, text: '> SYSTEM_ONLINE' }
        ];

        function getStatusText(val) {
          var currentText = statuses[0].text;
          for (var i = 0; i < statuses.length; i++) {
            if (val >= statuses[i].min) {
              currentText = statuses[i].text;
            }
          }
          return currentText;
        }
        
        var interval = setInterval(function() {
          if (count < 85) {
            count += Math.floor(Math.random() * 5) + 1;
            if (count > 85) count = 85;
            update(count);
          }
        }, 80);

        window.addEventListener('load', function() {
          clearInterval(interval);
          var endInterval = setInterval(function() {
            if (count < 100) {
              count += 3;
              if (count > 100) count = 100;
              update(count);
            } else {
              clearInterval(endInterval);
              setTimeout(function() {
                loaderEl.classList.add('loaded');
              }, 400);
            }
          }, 20);
        });

        function update(val) {
          if (counterEl) counterEl.textContent = String(val).padStart(2, '0') + '%';
          if (progressBar) progressBar.style.width = val + '%';
          if (statusEl) statusEl.textContent = getStatusText(val);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
