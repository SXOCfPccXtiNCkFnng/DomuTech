    <script>
      // Clean Domu look (white) is the brand default.
      // Migration key resets old "dark" preference from previous versions.
      (function () {
        var MIGRATION = "domu_clean_v2";
        if (localStorage.getItem("domu_palette") !== MIGRATION) {
          localStorage.setItem("domu_palette", MIGRATION);
          localStorage.setItem("domu_theme", "light");
          localStorage.removeItem("theme");
        }
        var stored = localStorage.getItem("domu_theme");
        if (stored === "dark") {
          document.documentElement.classList.remove("light-theme");
          document.documentElement.classList.add("dark-theme", "dark");
        } else {
          document.documentElement.classList.add("light-theme");
          document.documentElement.classList.remove("dark-theme", "dark");
          localStorage.setItem("domu_theme", "light");
        }
      })();
    </script>
